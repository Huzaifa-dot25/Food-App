worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml application/xml
                       application/xml+rss text/javascript;
    gzip_min_length    1000;
    client_max_body_size 10M;

    # ── Rate limiting zones ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=30r/m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────
    server {
        listen      80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name api.yourdomain.com;

        # SSL certificates (replace with your actual cert paths)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL configuration
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # HSTS (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Security headers
        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── API proxy ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Auth endpoints — tighter rate limiting ────────────────
        location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── SignalR WebSocket ─────────────────────────────────────
        location /hubs/ {
            proxy_pass         http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "Upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;  # Keep WebSocket open
        }

        # ── Static file uploads ───────────────────────────────────
        location /uploads/ {
            limit_req zone=uploads burst=10 nodelay;

            alias       /var/www/uploads/;
            expires     30d;
            add_header  Cache-Control "public, immutable";
            access_log  off;

            # Security: only allow image/document types
            location ~* \.(jpg|jpeg|png|gif|webp|pdf)$ {
                add_header Content-Disposition "inline";
            }
            location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
                deny all;
            }
        }

        # ── Health check (no rate limit, no log) ─────────────────
        location /health {
            proxy_pass http://api:8080;
            access_log off;
        }

        # ── Swagger (disable in production if needed) ─────────────
        location /swagger {
            proxy_pass http://api:8080;
        }
    }
}
